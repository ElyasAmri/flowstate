<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <!-- F + straight beam, with the bottom-right half fully filled (gradient). -->
  <defs>
    <linearGradient id="tile" x1="0" y1="0" x2="0" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1E293B"/><stop offset="1" stop-color="#0F172A"/>
    </linearGradient>
    <linearGradient id="g3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2DD4BF"/><stop offset="1" stop-color="#3B82F6"/>
    </linearGradient>
    <!-- matches the square stroke's outer edge exactly (168-15 .. 344+15, r44+15) -->
    <clipPath id="sq"><rect x="153" y="153" width="206" height="206" rx="59"/></clipPath>
  </defs>
  <rect width="512" height="512" rx="116" fill="url(#tile)"/>
  <rect x="168" y="168" width="175" height="175" rx="44" fill="none" stroke="#E2E8F0" stroke-width="30"/>
  <path d="M168 232 H300" fill="none" stroke="#E2E8F0" stroke-width="30" stroke-linecap="butt"/>
  <g clip-path="url(#sq)">
    <!-- bottom-right half, fully filled (white) -->
    <path d="M168 344 L330 344 L330 168 Z" fill="#E2E8F0"/>
    <!-- straight beam on top (bg-coloured halo keeps the gap along the diagonal) -->
    <path d="M140 372 L372 140" fill="none" stroke="url(#tile)" stroke-width="74"/>
    <path d="M140 372 L372 140" fill="none" stroke="url(#g3)" stroke-width="40"/>
  </g>
</svg>
